
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greywaken Clinical AI Workbook</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px;
        }
        h1 {
            color: #1a365d;
            font-size: 2.5em;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }
        h2 {
            color: #2b6cb0;
            font-size: 1.8em;
            margin-top: 40px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 8px;
        }
        h3 {
            color: #2d3748;
            font-size: 1.4em;
            margin-top: 30px;
        }
        strong {
            color: #1a202c;
        }
        pre {
            background-color: #f7fafc;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            overflow-x: auto;
        }
        code {
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
            font-size: 0.9em;
            color: #c53030;
        }
        pre code {
            color: #2d3748;
        }
        ul, ol {
            margin-top: 10px;
            margin-bottom: 20px;
        }
        li {
            margin-bottom: 8px;
        }
        p {
            margin-bottom: 15px;
        }
        a {
            color: #3182ce;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        @media print {
            body {
                padding: 0;
                max-width: 100%;
            }
            h2 {
                page-break-before: always;
            }
            a {
                text-decoration: underline;
                color: #000;
            }
        }
    </style>
</head>
<body>
    ${rawHtml}
</body>
</html>
